<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFlow | Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-body">
    <main class="auth-wrapper">
        <section class="auth-card">
            <div class="auth-header">
                <h1>Gym<span>Flow</span></h1>
                <p>Domina tu disciplina</p>
            </div>
            <form id="auth-form">
                <input type="email" id="email" placeholder="Correo electrónico" required>
                <input type="password" id="password" placeholder="Contraseña" required>
                <div id="register-fields" class="hidden">
                    <input type="text" id="display-name" placeholder="Tu nombre">
                </div>
                <button type="submit" id="auth-submit-btn" class="btn-primary">Entrar</button>
            </form>
            <div class="auth-footer">
                <a href="#" id="toggle-auth">¿No tienes cuenta? Regístrate</a>
            </div>
        </section>
    </main>
    <script src="js/auth.js" type="module"></script>
</body>
</html>
