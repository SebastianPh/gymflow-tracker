<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

<body>
    <main class="container page-margin">
        <div class="header-page">
            <h2>Mi Plan Maestro</h2>
            <p>Configura tus días y ejercicios.</p>
        </div>

        <div class="setup-group">
            <label>¿Cuántos días a la semana entrenas?</label>
            <select id="days-count">
                <option value="0">Seleccionar...</option>
                <option value="1">1 Día</option><option value="2">2 Días</option>
                <option value="3">3 Días</option><option value="4">4 Días</option>
                <option value="5">5 Días</option><option value="6">6 Días</option>
                <option value="7">7 Días</option>
            </select>
        </div>

        <div id="config-list" class="config-cards-container">
            </div>

        <button id="save-plan-btn" class="btn-primary hidden">Guardar Plan Maestro</button>
    </main>
