<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFlow | Admin Panel</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .admin-container { padding: 20px; color: white; }
        .user-table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #1e293b; border-radius: 8px; overflow: hidden; }
        .user-table th, .user-table td { padding: 15px; text-align: left; border-bottom: 1px solid #334155; }
        .user-table th { background: #0f172a; color: #007bff; }
        .btn-action { padding: 5px 10px; border-radius: 4px; border: none; cursor: pointer; margin-right: 5px; }
        .btn-view { background: #10b981; color: white; }
        .btn-delete { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">Gym<span>Flow</span> Admin</div>
        <a href="home.html" style="color: white; text-decoration: none;">← Volver</a>
    </nav>

    <main class="admin-container">
        <h2>Gestión de Atletas</h2>
        <p>Aquí puedes ver quiénes están usando la app y gestionar sus planes.</p>
        
        <table class="user-table">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="users-list">
                </tbody>
        </table>
    </main>

    <script src="js/admin.js" type="module"></script>
</body>
</html>
