<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymFlow | Inicio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <style>
        /* Estilo rápido para que el panel de admin se vea profesional */
        .admin-panel {
            display: none; /* Se activa desde el JS solo para ti */
            background: #f0f4f8;
            border-left: 5px solid #007bff;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        .admin-badge {
            background: #007bff;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">Gym<span>Flow</span></div>
        <button id="logout-btn" class="btn-logout-icon">Logout</button>
    </nav>

    <main class="container">
        <section id="admin-section" class="admin-panel">
            <h3><span class="admin-badge">Admin</span> Panel de Control</h3>
            <p>Gestiona usuarios y rutinas globales.</p>
            <button onclick="window.location.href='admin-users.html'" class="btn-primary">Ver Usuarios</button>
        </section>

        <section class="welcome-section">
            <h2>Hola, <span id="user-name">Atleta</span> 👋</h2>
            <div class="streak-card">
                <p>🔥 Racha: <strong id="user-streak">0</strong> días entrenados</p>
            </div>
        </section>

        <section class="calendar-section">
            <h3>Registro Mensual</h3>
            <div id="monthly-calendar" class="calendar-grid"></div>
        </section>
    </main>

    <div class="bottom-nav">
    <a href="home.html" class="nav-item">Inicio</a>
    <a href="config.html" class="nav-item">Configurar</a>
    <a href="train.html" class="nav-item">Entrenar</a>
    <a href="progress.html" class="nav-item">Progreso</a>
    <a href="gymreels.html" class="nav-item">GymReels</a>
    <a href="profile.html" class="nav-item">Profile</a>
</div>
    <script src="js/home.js" type="module"></script>
</body>
</html>
